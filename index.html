<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Property Generator</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f5f6f8;
  margin: 0;
  padding: 20px;
}

/* HEADER TITLE */
.header {
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 20px;
  color: #1976d2;
}

.container {
  max-width: 900px;
  margin: auto;
  background: #fff;
  border-radius: 8px;
  padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.tabs {
  display: flex;
  border-bottom: 2px solid #ddd;
  margin-bottom: 20px;
}

.tab {
  padding: 10px 20px;
  cursor: pointer;
  border: 1px solid #ddd;
  border-bottom: none;
  background: #f9f9f9;
}

.tab.active {
  background: #fff;
  font-weight: bold;
}

.row {
  display: flex;
  gap: 20px;
  margin-bottom: 15px;
}

.field {
  flex: 1;
  display: flex;
  flex-direction: column;
}

label {
  margin-bottom: 5px;
  font-size: 14px;
  color: #444;
}

input, select {
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
}

.checkbox {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 25px;
}

button {
  width: 100%;
  padding: 12px;
  background: #1976d2;
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #125aa0;
}

.result {
  margin-top: 20px;
}

textarea {
  width: 100%;
  height: 120px;
  border: 1px solid #ccc;
  border-radius: 5px;
  padding: 10px;
}

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
  color: #666;
}

.footer a {
  color: #1976d2;
  text-decoration: none;
  font-weight: bold;
}

.footer a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="header">Secure Properties Generator</div>

<div class="container">

  <div class="tabs">
    <div class="tab active">String</div>
  </div>

  <div class="row">
    <div class="field">
      <label>Operation</label>
      <select id="operation">
        <option>Encrypt</option>
        <option>Decrypt</option>
      </select>
    </div>

    <div class="field">
      <label>Algorithm</label>
      <select>
        <option>AES (default)</option>
        <option>Blowfish</option>
        <option>DES</option>
        <option>DESede</option>
        <option>RC2</option>
        <option>RCA</option>
      </select>
    </div>

    <div class="field">
      <label>State</label>
      <select>
        <option>CBC (default)</option>
        <option>CFB</option>
        <option>ECB</option>
        <option>OFB</option>
      </select>
    </div>

    <div class="checkbox">
      <input type="checkbox" id="iv" />
      <label for="iv">Use random IVs</label>
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label>Key</label>
      <input type="text" id="key" placeholder="Enter key">
    </div>

    <div class="field">
      <label>Value</label>
      <input type="text" id="value" placeholder="Enter value">
    </div>
  </div>

  <button onclick="generate()">Generate</button>

  <div class="result">
    <label>Result</label>
    <textarea id="result"></textarea>
  </div>

</div>

<!-- FOOTER ADDED -->
<div class="footer">
  Created by <a href="https://github.com/Narsing-s" target="_blank">Narsing-s</a> GitHub
</div>

<script>
function generate() {
  const operation = document.getElementById('operation').value;
  const key = document.getElementById('key').value;
  const value = document.getElementById('value').value;

  if (!key || !value) {
    alert('Please enter key and value');
    return;
  }

  let output = '';

  if (operation === 'Encrypt') {
    output = btoa(value + key);
  } else {
    try {
      output = atob(value);
    } catch (e) {
      output = 'Invalid encrypted value';
    }
  }

  document.getElementById('result').value = output;
}
</script>

</body>
</html>
